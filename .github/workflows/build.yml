name: Build Debug APK

on:
  push:
    branches: [ main, master, feature/skills-system ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile Kotlin
        id: compile
        run: |
          ./gradlew compileDebugKotlin --stacktrace 2>&1 | tee /tmp/compile.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Show compile error log
        if: failure() && steps.compile.outputs.exit_code != '0'
        run: |
          {
            echo "### Compilation Error Log"
            echo '```'
            tail -200 /tmp/compile.log
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/assemble.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Show assemble error log
        if: failure()
        run: |
          {
            echo "### Assemble Error Log"
            echo '```'
            tail -200 /tmp/assemble.log
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceControl-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7